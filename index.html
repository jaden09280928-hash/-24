<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>내 전용 앱</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="2.jpeg">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 0; background: #f2f2f7; margin: 0; min-height: 100vh; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.08); width: 85%; max-width: 320px; position: relative; }
        .title { text-align: center; font-size: 13px; font-weight: 700; color: #8e8e93; margin-bottom: 20px; }
        .profile-img { width: 110px; height: 140px; background-color: #eee; margin: 0 auto 20px; display: block; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; }
        .info-group { margin-bottom: 15px; }
        .label { font-size: 11px; color: #aeaeb2; margin-bottom: 2px; }
        .value { font-size: 17px; color: #1c1c1e; font-weight: 600; border-bottom: 1px solid #f2f2f7; padding-bottom: 5px; }
        .issuer { margin-top: 30px; text-align: center; font-size: 20px; font-weight: 800; color: #000; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">주민등록증 모바일 확인서비스</div>
        
        <img src="2.jpeg" class="profile-img">
        
        <div class="info-group">
            <div class="label">성명</div>
            <div class="value">원준석</div>
        </div>
        
        <div class="info-group">
            <div class="label">주민등록번호</div>
            <div class="value">050129-3085312</div>
        </div>
        
        <div class="info-group">
            <div class="label">주소</div>
            <div class="value">경기도 파주시 와석순환로 15 803동 1502호</div>
        </div>

        <div class="info-group">
            <div class="label">발행일</div>
            <div class="value">2024.02.03</div>
        </div>

        <div class="issuer">경기도 파주시장</div>
    </div>

</body>
</html>
