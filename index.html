<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>모바일 신분증</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="IMG_5016.jpeg">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; width: 90%; max-width: 340px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 30px; }
        .title { text-align: center; font-size: 14px; font-weight: bold; color: #8e8e93; margin-bottom: 20px; }
        /* 카드 안 프로필 사진은 2.jpeg로 설정 */
        .profile-img { width: 110px; height: 140px; background: #eee; margin: 0 auto 20px; display: block; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
        
        .input-group { margin-bottom: 15px; border-bottom: 1px solid #efeff4; padding-bottom: 5px; }
        label { font-size: 11px; color: #aeaeb2; display: block; margin-bottom: 4px; }
        input { width: 100%; border: none; font-size: 17px; font-weight: 600; color: #1c1c1e; outline: none; background: transparent; padding: 5px 0; }
        
        .save-btn { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; font-size: 16px; }
        .issuer { margin-top: 30px; text-align: center; font-size: 20px; font-weight: 800; letter-spacing: 4px; color: #000; }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">주민등록증 모바일 확인서비스</div>
        <img src="2.jpeg" class="profile-img">
        
        <div class="input-group">
            <label>성명</label>
            <input type="text" id="name" placeholder="이름 입력">
        </div>
        <div class="input-group">
            <label>주민등록번호</label>
            <input type="text" id="ssn" placeholder="000000-0000000">
        </div>
        <div class="input-group">
            <label>주소</label>
            <input type="text" id="addr" placeholder="주소 입력">
        </div>
        <div class="input-group">
            <label>발행일</label>
            <input type="text" id="date" value="2024.02.03">
        </div>

        <button class="save-btn" onclick="saveInfo()">정보 저장하기</button>
        <div class="issuer">파 주 시 장</div>
    </div>

    <script>
        window.onload = function() {
            if(localStorage.getItem('my_name')) document.getElementById('name').value = localStorage.getItem('my_name');
            if(localStorage.getItem('my_ssn')) document.getElementById('ssn').value = localStorage.getItem('my_ssn');
            if(localStorage.getItem('my_addr')) document.getElementById('addr').value = localStorage.getItem('my_addr');
            if(localStorage.getItem('my_date')) document.getElementById('date').value = localStorage.getItem('my_date');
        }

        function saveInfo() {
            localStorage.setItem('my_name', document.getElementById('name').value);
            localStorage.setItem('my_ssn', document.getElementById('ssn').value);
            localStorage.setItem('my_addr', document.getElementById('addr').value);
            localStorage.setItem('my_date', document.getElementById('date').value);
            alert('정보가 성공적으로 저장되었습니다!');
        }
    </script>
</body>
</html>
